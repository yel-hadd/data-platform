# Alembic configuration for the Data Platform
# sqlalchemy.url is intentionally left blank — it is set in alembic/env.py
# from settings.database_url so a single source of truth is maintained.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
